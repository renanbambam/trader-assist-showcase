<svg width="900" height="580" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580">
  <defs>
    <style>text { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace; }</style>
  </defs>
  <rect width="900" height="580" fill="#060b14"/>

  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600" letter-spacing="3">CLEAN ARCHITECTURE</text>
  <line x1="260" y1="50" x2="640" y2="50" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Interface Layer -->
  <rect x="28" y="60" width="844" height="492" rx="12" fill="rgba(99,102,241,0.03)" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="52" y="80" fill="#6366f1" font-size="9.5" font-weight="700" letter-spacing="2">INTERFACE</text>
  <g fill="#6366f1" font-size="9" opacity="0.65">
    <text x="148" y="80">FastAPI Routers</text>
    <text x="290" y="80">WebSocket Handler</text>
    <text x="446" y="80">Middleware Stack</text>
    <text x="578" y="80">APScheduler Jobs</text>
    <text x="706" y="80">ContextVar IDs</text>
  </g>

  <!-- Infrastructure Layer -->
  <rect x="70" y="98" width="760" height="432" rx="10" fill="rgba(245,158,11,0.025)" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="92" y="117" fill="#f59e0b" font-size="9.5" font-weight="700" letter-spacing="2">INFRASTRUCTURE</text>
  <g fill="#f59e0b" font-size="9" opacity="0.65">
    <text x="218" y="117">SQLAlchemy Repos</text>
    <text x="378" y="117">Redis EventBus</text>
    <text x="510" y="117">Claude Adapter</text>
    <text x="638" y="117">MT5 + yfinance</text>
    <text x="762" y="117">Broadcaster</text>
  </g>

  <!-- Application Layer -->
  <rect x="118" y="134" width="664" height="362" rx="8" fill="rgba(59,130,246,0.025)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="153" fill="#3b82f6" font-size="9.5" font-weight="700" letter-spacing="2">APPLICATION</text>
  <g fill="#3b82f6" font-size="9" opacity="0.65">
    <text x="240" y="153">Use Cases</text>
    <text x="334" y="153">DTOs</text>
    <text x="402" y="153">Port Interfaces</text>
    <text x="534" y="153">Event Types</text>
    <text x="644" y="153">Validators</text>
  </g>

  <!-- Domain Layer -->
  <rect x="172" y="170" width="556" height="302" rx="6" fill="#080f1c" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="194" text-anchor="middle" fill="#10b981" font-size="13" font-weight="700" letter-spacing="3">DOMAIN</text>
  <line x1="190" y1="203" x2="710" y2="203" stroke="rgba(16,185,129,0.14)" stroke-width="1"/>

  <!-- TRADE -->
  <rect x="184" y="213" width="152" height="240" rx="4" fill="rgba(16,185,129,0.04)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="260" y="231" text-anchor="middle" fill="#10b981" font-size="9" font-weight="600" letter-spacing="1">TRADE</text>
  <line x1="188" y1="237" x2="332" y2="237" stroke="rgba(16,185,129,0.09)" stroke-width="1"/>
  <g fill="rgba(226,232,240,0.5)" font-size="8.5">
