    <text x="194" y="268">• RiskProfile VO</text>
    <text x="194" y="283">• ChecklistValidator</text>
    <text x="194" y="298">• TradeStatus</text>
    <text x="194" y="313">• TradeDirection</text>
    <text x="194" y="328">• R-Multiple calc</text>
    <text x="194" y="343">• TradeResult</text>
  </g>

  <!-- ANALYSIS -->
  <rect x="344" y="213" width="154" height="240" rx="4" fill="rgba(16,185,129,0.04)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="421" y="231" text-anchor="middle" fill="#10b981" font-size="9" font-weight="600" letter-spacing="1">ANALYSIS</text>
  <line x1="348" y1="237" x2="494" y2="237" stroke="rgba(16,185,129,0.09)" stroke-width="1"/>
  <g fill="rgba(226,232,240,0.5)" font-size="8.5">
    <text x="354" y="253">• Analysis Entity</text>
    <text x="354" y="268">• ConfidenceScore VO</text>
    <text x="354" y="283">• ConfidenceFactors</text>
    <text x="354" y="298">• KeyLevel VO</text>
    <text x="354" y="313">• Scenario VO</text>
    <text x="354" y="328">• ConfidenceLabel</text>
    <text x="354" y="343">• AnalysisType</text>
  </g>

  <!-- BRIEFING -->
  <rect x="506" y="213" width="200" height="110" rx="4" fill="rgba(16,185,129,0.04)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="606" y="231" text-anchor="middle" fill="#10b981" font-size="9" font-weight="600" letter-spacing="1">BRIEFING</text>
  <line x1="510" y1="237" x2="702" y2="237" stroke="rgba(16,185,129,0.09)" stroke-width="1"/>
  <g fill="rgba(226,232,240,0.5)" font-size="8.5">
    <text x="516" y="253">• Briefing Entity</text>
    <text x="516" y="268">• KeyLevels</text>
    <text x="516" y="283">• UpcomingEvent VO</text>
    <text x="516" y="298">• BriefingType</text>
  </g>

  <!-- REPLAY -->
  <rect x="506" y="331" width="200" height="122" rx="4" fill="rgba(16,185,129,0.04)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="606" y="349" text-anchor="middle" fill="#10b981" font-size="9" font-weight="600" letter-spacing="1">REPLAY</text>
  <line x1="510" y1="355" x2="702" y2="355" stroke="rgba(16,185,129,0.09)" stroke-width="1"/>
  <g fill="rgba(226,232,240,0.5)" font-size="8.5">
    <text x="516" y="371">• ReplaySession</text>
    <text x="516" y="386">• ReplayFrame VO</text>
    <text x="516" y="401">• SessionState</text>
    <text x="516" y="416">• FrameIndex</text>
  </g>

  <!-- Legend -->
  <g transform="translate(36,516)">
    <text x="0" y="12" fill="rgba(255,255,255,0.28)" font-size="8" letter-spacing="0.5">DEPENDENCY RULE — source code imports point inward only; outer layers never imported by inner layers</text>
    <rect x="0" y="22" width="9" height="9" rx="1" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="14" y="30" fill="#6366f1" font-size="8">Interface</text>
    <rect x="98" y="22" width="9" height="9" rx="1" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="112" y="30" fill="#f59e0b" font-size="8">Infrastructure</text>
    <rect x="218" y="22" width="9" height="9" rx="1" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="232" y="30" fill="#3b82f6" font-size="8">Application</text>
    <rect x="316" y="22" width="9" height="9" rx="1" fill="none" stroke="#10b981" stroke-width="2"/>
    <text x="330" y="30" fill="#10b981" font-size="8">Domain</text>
  </g>
</svg>
